            filter: invert(1) hue-rotate(180deg);
        }

        /* ここに文字を大きくする命令（CSS）を書いています */
        body {
            font-size: 16px;          /* 全体の文字サイズ（標準よりかなり大きめ） */

        h1 {

            border-bottom: 2px solid #333; /*下に無骨な1本線を引く */
            padding-bottom: 10px;
        }
        h2 {
            font-size: 20px;          /* 二番目に大きな見出し */
            margin-top: 40px;
        }
        li {
            margin-bottom: 10px;      /* 箇条書きの間隔を広げる */
        }

        /* ページ全体を反転 */
        html {
            filter: invert(1) hue-rotate(180deg);
        }

        /* 画像、動画、埋め込みコンテンツを再反転して元に戻す */
        img, video, iframe, canvas {

        }
